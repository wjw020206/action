name: Update EPG File

on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: self-hosted
    environment: action

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Download EPG file
      shell: powershell
      run: curl.exe -fL -o epg.gz https://gitee.com/mytv-android/myepg/raw/master/output/epg.gz

    - name: Commit and push changes (squash history)
      shell: powershell
      env:
        GH_TOKEN: ${{ secrets.TOKEN }}
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add epg.gz
        git diff --cached --quiet
        $hasChanges = $LASTEXITCODE -ne 0
        if ($hasChanges) {
          # 获取初始提交的 hash
          $initialCommit = git rev-list --max-parents=0 HEAD
          # 软重置到初始提交，保留所有更改在暂存区
          git reset --soft $initialCommit
          # 重新添加文件
          git add -A
          # 修改初始提交
          git commit --amend -m "GitHub Actions Auto Updated"
          # 推送到 GitHub
          git remote set-url origin "https://x-access-token:$env:GH_TOKEN@github.com/wjw020206/action.git"
          git push --force
          # 推送到 Gitee
          git remote add gitee "https://wjw020206:$env:GITEE_TOKEN@gitee.com/wjw020206/iptv.git" 2>$null
          git remote set-url gitee "https://wjw020206:$env:GITEE_TOKEN@gitee.com/wjw020206/iptv.git"
          git push gitee HEAD:main --force
        }
