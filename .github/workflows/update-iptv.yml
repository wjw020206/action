name: Update IPTV File

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-iptv:
    runs-on: self-hosted
    environment: action

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Download IPTV file
      shell: powershell
      run: curl.exe -fL -o iptv.m3u "${{ secrets.LINK }}"

    - name: Check if download is valid
      shell: powershell
      run: |
        $content = Get-Content -Path iptv.m3u -Raw
        if ($content -match "未验证通过|请求过于频繁") {
          Write-Error "IPTV 文件内容无效：检测到 '未验证通过' 或 '请求过于频繁'"
          exit 1
        }

    - name: Copy iptv.m3u to iptv2.m3u
      shell: powershell
      run: Copy-Item -Path iptv.m3u -Destination iptv2.m3u

    - name: Insert fixedtv.m3u content after header
      shell: powershell
      run: |
        $iptvContent = Get-Content -Path iptv.m3u -Encoding UTF8
        $fixedContent = Get-Content -Path fixedtv.m3u -Encoding UTF8
        $result = @($iptvContent[0]) + $fixedContent + $iptvContent[1..($iptvContent.Length - 1)]
        $result | Set-Content -Path iptv.m3u -Encoding UTF8

    - name: Commit and push changes (squash history)
      shell: powershell
      env:
        GH_TOKEN: ${{ secrets.TOKEN }}
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add iptv.m3u iptv2.m3u
        git diff --cached --quiet
        $hasChanges = $LASTEXITCODE -ne 0
        if ($hasChanges) {
          # 获取初始提交的 hash
          $initialCommit = git rev-list --max-parents=0 HEAD
          # 软重置到初始提交，保留所有更改在暂存区
          git reset --soft $initialCommit
          # 重新添加文件
          git add -A
          # 修改初始提交
          git commit --amend -m "GitHub Actions Auto Updated"
          # 推送到 GitHub
          git remote set-url origin "https://x-access-token:$env:GH_TOKEN@github.com/wjw020206/action.git"
          git push --force
          # 推送到 Gitee
          git remote add gitee "https://wjw020206:$env:GITEE_TOKEN@gitee.com/wjw020206/iptv.git" 2>$null
          git remote set-url gitee "https://wjw020206:$env:GITEE_TOKEN@gitee.com/wjw020206/iptv.git"
          git push gitee HEAD:main --force
        }
